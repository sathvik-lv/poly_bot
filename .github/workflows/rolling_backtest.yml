name: Rolling Backtest (Hourly)

on:
  schedule:
    # Run every hour — rolling backtest is fast (~30 seconds)
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  rolling-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Create .env
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Run rolling backtest
        run: python scripts/rolling_backtest.py --batch 150
        timeout-minutes: 10

      - name: Commit results
        run: |
          git config user.name "poly-bot[bot]"
          git config user.email "poly-bot[bot]@users.noreply.github.com"
          git add data/rolling_accuracy.json
          git diff --staged --quiet || git commit -m "rolling: backtest $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
