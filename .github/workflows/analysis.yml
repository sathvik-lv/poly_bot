name: Poly Bot Analysis (Every 6h)

on:
  schedule:
    # Every hour — maximize data collection
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Create .env
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" >> .env
          echo "MARKETSTACK_KEY=${{ secrets.MARKETSTACK_KEY }}" >> .env
          echo "ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "METACULUS_API_TOKEN=${{ secrets.METACULUS_API_TOKEN }}" >> .env

      - name: Finance scanner
        run: python scripts/finance_scanner.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Arbitrage scanner
        run: python scripts/arbitrage_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Cross-platform comparison
        run: python scripts/cross_platform.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Logical arbitrage
        run: python scripts/logical_arb.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Niche data scanner
        run: python scripts/niche_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "poly-bot[bot]"
          git config user.email "poly-bot[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: analysis $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
