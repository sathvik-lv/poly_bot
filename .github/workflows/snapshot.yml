name: Price Snapshot

on:
  schedule:
    # Run every 30 minutes for fast time series data accumulation
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy scipy scikit-learn python-dotenv

      - name: Run price snapshots
        run: python scripts/price_snapshots.py
        timeout-minutes: 2

      - name: Commit snapshots
        run: |
          git config user.name "poly-bot[bot]"
          git config user.email "poly-bot[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "snapshot: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
