name: Poly Bot Cycle

on:
  schedule:
    # Full cycle every 6 hours (paper trading + all scanners is heavy)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to push data commits back

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Create .env
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "METACULUS_API_TOKEN=${{ secrets.METACULUS_API_TOKEN }}" >> .env
          echo "RELAYER_API_KEY=${{ secrets.RELAYER_API_KEY }}" >> .env
          echo "RELAYER_API_KEY_ADDRESS=${{ secrets.RELAYER_API_KEY_ADDRESS }}" >> .env
          echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" >> .env
          echo "MARKETSTACK_KEY=${{ secrets.MARKETSTACK_KEY }}" >> .env
          echo "ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Run paper trader scan
        run: python scripts/paper_trader.py --scan -n 30
        timeout-minutes: 15
        continue-on-error: true

      - name: Run paper trader resolve
        run: python scripts/paper_trader.py --resolve
        timeout-minutes: 3
        continue-on-error: true

      - name: Run paper trader report
        run: python scripts/paper_trader.py --report
        timeout-minutes: 1
        continue-on-error: true

      - name: Run live tracker resolve
        run: python scripts/live_tracker.py --resolve
        timeout-minutes: 3
        continue-on-error: true

      - name: Run live tracker report
        run: python scripts/live_tracker.py --report
        timeout-minutes: 1
        continue-on-error: true

      - name: Run finance scanner
        run: python scripts/finance_scanner.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run arbitrage scanner
        run: python scripts/arbitrage_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Run cross-platform comparison
        run: python scripts/cross_platform.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run logical arbitrage
        run: python scripts/logical_arb.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Run niche data scanner
        run: python scripts/niche_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Run price snapshots
        run: python scripts/price_snapshots.py
        timeout-minutes: 2
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "poly-bot[bot]"
          git config user.email "poly-bot[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: cycle $(date -u +'%Y-%m-%d %H:%M') UTC | paper+track+arb+xplatform"
          git push
