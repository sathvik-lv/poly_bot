name: Poly Bot (Every 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Create .env
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "METACULUS_API_TOKEN=${{ secrets.METACULUS_API_TOKEN }}" >> .env
          echo "RELAYER_API_KEY=${{ secrets.RELAYER_API_KEY }}" >> .env
          echo "RELAYER_API_KEY_ADDRESS=${{ secrets.RELAYER_API_KEY_ADDRESS }}" >> .env
          echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" >> .env
          echo "MARKETSTACK_KEY=${{ secrets.MARKETSTACK_KEY }}" >> .env
          echo "ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Scan + paper trade (50 markets)
        run: python scripts/paper_trader.py --scan -n 50
        timeout-minutes: 15
        continue-on-error: true

      - name: Resolve paper trades
        run: python scripts/paper_trader.py --resolve
        timeout-minutes: 3
        continue-on-error: true

      - name: Paper trade report
        run: python scripts/paper_trader.py --report
        timeout-minutes: 1
        continue-on-error: true

      - name: Live tracker scan (record predictions for accuracy data)
        run: python scripts/live_tracker.py --scan -n 50
        timeout-minutes: 15
        continue-on-error: true

      - name: Resolve live predictions
        run: python scripts/live_tracker.py --resolve
        timeout-minutes: 3
        continue-on-error: true

      - name: Live tracker report
        run: python scripts/live_tracker.py --report
        timeout-minutes: 1
        continue-on-error: true

      # ============================================================
      # TEST 1 — Parallel shadow ledger (Kelly fraction stress test)
      # Same Kelly determination as Test 0, only the allocation
      # multiplier varies in the report (1/8x, 1/5x, 1/4x, 1/3x, 1/2x, 1x).
      # Writes only to data/test1_ledger.jsonl — does not touch Test 0.
      # ============================================================
      - name: Test 1 collector (200 markets, re-predict 6h)
        run: python scripts/test1_collector.py -n 200
        timeout-minutes: 20
        continue-on-error: true

      - name: Test 1 resolver
        run: python scripts/test1_resolver.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Test 1 compounded report
        run: python scripts/test1_report.py
        timeout-minutes: 1
        continue-on-error: true

      - name: Price snapshots
        run: python scripts/price_snapshots.py
        timeout-minutes: 2
        continue-on-error: true

      - name: Finance scanner
        run: python scripts/finance_scanner.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Arbitrage scanner
        run: python scripts/arbitrage_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Cross-platform comparison
        run: python scripts/cross_platform.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Logical arbitrage
        run: python scripts/logical_arb.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Niche data scanner
        run: python scripts/niche_scanner.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "poly-bot[bot]"
          git config user.email "poly-bot[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "auto: cycle $(date -u +'%Y-%m-%d %H:%M') UTC"
            # On overlapping cycles, prefer THIS run's data on conflict
            # ('theirs' in rebase = the commit being applied = our local commit).
            # The next 30-min cycle will refresh anything we drop.
            # Retry once in case another push lands during the rebase.
            for attempt in 1 2 3; do
              if git pull --rebase -X theirs && git push; then
                echo "Push succeeded on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed, retrying..."
              git rebase --abort 2>/dev/null || true
              sleep $((attempt * 5))
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
